        }
        .location-switcher {

        button {
            background-color: var(--light-green);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--gold);
        }
        .pdf-viewer {
            display: none;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        /* Additional styles for mobile responsiveness, gallery, etc. */
